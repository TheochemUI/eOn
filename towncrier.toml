[tool.towncrier]
# Name/version here so `towncrier build --draft` does not import the eon package
# (avoids numpy/native deps in CI/release-prepare). cog/bump passes --version explicitly.
name = "eon"
# Keep in sync with pyproject.toml on cuts; draft-only if this lags (cog passes --version).
version = "2.15.0"
directory = "docs/newsfragments"
filename = "CHANGELOG.md"
start_string = "<!-- towncrier release notes start -->\n"
underlines = ["", "", ""]
title_format = "## [{version}](https://github.com/TheochemUI/eOn/tree/{version}) - {project_date}"
issue_format = "[#{issue}](https://github.com/TheochemUI/eOn/issues/{issue})"

[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[[tool.towncrier.type]]
directory = "removed"
name = "Removed"
showcontent = true

[[tool.towncrier.type]]
directory = "deprecated"
name = "Deprecated"
showcontent = true

[[tool.towncrier.type]]
directory = "added"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "dev"
name = "Developer"
showcontent = true

[[tool.towncrier.type]]
directory = "changed"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "fixed"
name = "Fixed"
showcontent = true
