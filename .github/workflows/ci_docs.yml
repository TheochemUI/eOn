name: Build and Deploy Documentation

concurrency:
  group: "pages"
  cancel-in-progress: true

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    # Check all PR
  schedule:
    - cron: '0 8 * * 1' # run every Monday at 8am UTC

env:
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build_docs:
    name: Build documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          activate-environment: true
          environments: >-
            docs-mta

      - name: Configure sccache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Build and install eonclient
        shell: pixi run -e docs-mta bash -e {0}
        run: |
          pixi run ensure_cbindgen
          meson setup bbdir --prefix=$CONDA_PREFIX --libdir=lib \
            -Dwith_metatomic=True -Dtorch_version=2.10 -Dpip_metatomic=True
          meson install -C bbdir

      - name: Generate Docs
        shell: pixi run -e docs-mta bash -e {0}
        run: |
          pip install . --no-build-isolation
          # Ensure eonclient can find shared libs (metatensor, torch) at runtime
          PYLIBS=$(python -c "
          import torch, metatensor.torch, metatomic.torch, os
          paths = set()
          for mod in [torch, metatensor.torch, metatomic.torch]:
              d = os.path.dirname(mod.__file__)
              paths.add(d)
              lib = os.path.join(d, 'lib')
              if os.path.isdir(lib): paths.add(lib)
              for sub in os.listdir(d) if os.path.isdir(d) else []:
                  full = os.path.join(d, sub, 'lib')
                  if os.path.isdir(full): paths.add(full)
          print(':'.join(paths))
          ")
          export LD_LIBRARY_PATH="${CONDA_PREFIX}/lib:${PYLIBS}:${LD_LIBRARY_PATH:-}"
          # Patch the ipykernel spec so myst-nb kernels inherit PATH and
          # LD_LIBRARY_PATH (the kernel subprocess does not reliably inherit
          # the pixi-activated shell environment)
          python -c "
          import json, sys, os
          from pathlib import Path
          ks = Path(sys.prefix) / 'share/jupyter/kernels/python3/kernel.json'
          spec = json.loads(ks.read_text())
          env = spec.setdefault('env', {})
          env['LD_LIBRARY_PATH'] = os.environ.get('LD_LIBRARY_PATH', '')
          env['PATH'] = os.environ.get('PATH', '')
          ks.write_text(json.dumps(spec, indent=1))
          print(f'Patched {ks}')
          print(f'  PATH entries: {len(env[\"PATH\"].split(\":\"))}')
          "
          sphinx-build -b html docs/source docs/build/html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/build/html/

      - name: Deploy
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html/
