name: Comment benchmark results

on:
  workflow_run:
    workflows: ["Benchmark PR"]
    types: [completed]

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: results
          run-id: ${{ github.event_run.id || github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read results
        id: data
        run: |
          TABLE=$(cat results/comparison.txt)
          MAIN_SHA=$(grep main_sha results/metadata.txt | cut -d= -f2)
          PR_SHA=$(grep pr_sha results/metadata.txt | cut -d= -f2)
          echo "main_sha=$MAIN_SHA" >> "$GITHUB_OUTPUT"
          echo "pr_sha=$PR_SHA" >> "$GITHUB_OUTPUT"
          echo "table<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TABLE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Check for 10x regression
          REGRESSION="false"
          while read -r line; do
            if [[ "$line" =~ \|.*\|.*\|.*\|[[:space:]]*([0-9.]+)[[:space:]]*\| ]]; then
              RATIO="${BASH_REMATCH[1]}"
              if (( $(echo "$RATIO > 10.0" | bc -l) )); then
                REGRESSION="true"
                echo "Critical regression detected: ratio $RATIO"
              fi
            fi
          done <<< "$TABLE"
          echo "regression=$REGRESSION" >> "$GITHUB_OUTPUT"

      - name: Find associated PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.data.outputs.pr_sha }}';
            const { data } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr sha:${sha}`,
              per_page: 1,
            });
            if (data.items.length < 1) {
              core.setFailed(`No PR found for SHA ${sha}`);
              return;
            }
            core.setOutput('number', data.items[0].number);
            core.setOutput('node_id', data.items[0].node_id);

      - name: Convert PR to draft on critical regression
        if: steps.data.outputs.regression == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prId = '${{ steps.pr.outputs.node_id }}';
            const query = `
              mutation($id: ID!) {
                convertPullRequestToDraft(input: {pullRequestId: $id}) {
                  pullRequest {
                    number
                    isDraft
                  }
                }
              }
            `;
            await github.graphql(query, { id: prId });
            console.log(`PR ${{ steps.pr.outputs.number }} converted to draft due to performance regression.`);

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- asv-benchmark-result -->';
            const body = [
              marker,
              '## Benchmark results',
              '',
              '```',
              process.env.TABLE,
              '```',
              '',
              '<details><summary>Details</summary>',
              '',
              `- **main:** \`${process.env.MAIN_SHA.slice(0, 8)}\``,
              `- **PR:** \`${process.env.PR_SHA.slice(0, 8)}\``,
              '- Runner: `ubuntu-22.04`',
              '',
              '</details>',
            ].join('\n');

            const prNumber = parseInt('${{ steps.pr.outputs.number }}', 10);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
        env:
          TABLE: ${{ steps.data.outputs.table }}
          MAIN_SHA: ${{ steps.data.outputs.main_sha }}
          PR_SHA: ${{ steps.data.outputs.pr_sha }}
