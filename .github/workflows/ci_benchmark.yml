name: Benchmark PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
on:
  pull_request:
    branches: [main]

env:
  SCCACHE_GHA_ENABLED: "true"

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: main
            sha: ${{ github.event.pull_request.base.sha }}
          - label: pr
            sha: ${{ github.event.pull_request.head.sha }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout target commit
        run: |
          mkdir -p /tmp/_bench_preserve
          cp -r benchmarks/ /tmp/_bench_preserve/
          cp asv.conf.json /tmp/_bench_preserve/
          git checkout -f ${{ matrix.sha }}
          git clean -fd
          cp -r /tmp/_bench_preserve/benchmarks/ benchmarks/
          cp /tmp/_bench_preserve/asv.conf.json asv.conf.json

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: false
          activate-environment: true

      - uses: astral-sh/setup-uv@v5

      - name: Configure sccache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install cbindgen
        shell: bash
        run: command -v cbindgen || cargo install cbindgen

      - name: Build
        run: |
          pixi run bash -c "meson setup bbdir \
            --prefix=$CONDA_PREFIX --libdir=lib \
            --buildtype release --wipe 2>/dev/null \
            || meson setup bbdir --prefix=$CONDA_PREFIX \
            --libdir=lib --buildtype release"
          pixi run meson install -C bbdir

      - name: Run benchmarks
        run: |
          pixi run bash -c "pip install asv && asv machine --yes"
          pixi run asv run -E "existing:$(which python)" \
            --set-commit-hash ${{ matrix.sha }} \
            --record-samples --quick

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.label }}
          path: .asv/results/
          retention-days: 7

  combine:
    needs: benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@v5

      - name: Download main results
        uses: actions/download-artifact@v4
        with:
          name: bench-main
          path: results/

      - name: Download PR results
        uses: actions/download-artifact@v4
        with:
          name: bench-pr
          path: results/

      - name: Find result files and compare
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          PR_SHA="${{ github.event.pull_request.head.sha }}"
          BASE_PREFIX="${BASE_SHA:0:8}"
          PR_PREFIX="${PR_SHA:0:8}"
          BASE_FILE=$(find results -name "${BASE_PREFIX}*.json" | head -1)
          PR_FILE=$(find results -name "${PR_PREFIX}*.json" | head -1)
          BCONF=$(find results -name "benchmarks.json" | head -1)
          echo "Base file: $BASE_FILE"
          echo "PR file: $PR_FILE"
          echo "Benchmarks: $BCONF"
          BCONF_ARG=""
          if [ -n "$BCONF" ]; then
            BCONF_ARG="$BCONF"
          fi
          # Exit code 1 = regressions detected (expected, not an error)
          uvx --from "git+https://github.com/HaoZeke/asv_spyglass.git@enh-multiple-comparisons" \
            asv-spyglass compare "$BASE_FILE" "$PR_FILE" $BCONF_ARG \
            --label-before main --label-after pr \
            > results/comparison.txt || true
          if [ ! -s results/comparison.txt ]; then
            echo "::error::asv-spyglass compare produced no output"
            exit 1
          fi
          cat results/comparison.txt

      - name: Write metadata
        run: |
          echo "main_sha=${{ github.event.pull_request.base.sha }}" > results/metadata.txt
          echo "pr_sha=${{ github.event.pull_request.head.sha }}" >> results/metadata.txt

      - name: Upload combined results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results/
          retention-days: 7
