name: Benchmark PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
on:
  pull_request:
    branches: [main]

env:
  SCCACHE_GHA_ENABLED: "true"

jobs:
  benchmark:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          cache: true
          cache-write: false
          activate-environment: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Configure sccache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install ASV
        shell: pixi run bash -e {0}
        run: pip install asv

      - name: Initialise ASV machine
        shell: pixi run bash -e {0}
        run: asv machine --yes

      - name: Record commit SHAs
        id: shas
        run: |
          echo "pr=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          echo "main=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"

      # Save benchmark files from the PR before switching branches.
      - name: Stash benchmark suite
        run: |
          cp -r benchmarks /tmp/benchmarks
          cp asv.conf.json /tmp/asv.conf.json

      # ── Benchmark main ──────────────────────────────────────────
      - name: Build eonclient (main)
        shell: pixi run bash -e {0}
        run: |
          git checkout -f ${{ steps.shas.outputs.main }}
          git clean -fd
          meson setup bbdir --prefix=$CONDA_PREFIX --libdir=lib --buildtype release --wipe 2>/dev/null \
            || meson setup bbdir --prefix=$CONDA_PREFIX --libdir=lib --buildtype release
          meson install -C bbdir

      - name: Benchmark main
        id: bench_main
        continue-on-error: true
        shell: pixi run bash -e {0}
        run: |
          rm -rf benchmarks asv.conf.json
          cp -r /tmp/benchmarks benchmarks
          cp /tmp/asv.conf.json asv.conf.json
          asv run -E "existing:$(which python)" \
            --set-commit-hash ${{ steps.shas.outputs.main }} \
            --record-samples --quick

      # ── Benchmark PR HEAD ───────────────────────────────────────
      - name: Build eonclient (PR)
        shell: pixi run bash -e {0}
        run: |
          git checkout -f ${{ steps.shas.outputs.pr }}
          git clean -fd
          meson setup bbdir --prefix=$CONDA_PREFIX --libdir=lib --buildtype release --wipe 2>/dev/null \
            || meson setup bbdir --prefix=$CONDA_PREFIX --libdir=lib --buildtype release
          meson install -C bbdir

      - name: Benchmark PR
        id: bench_pr
        continue-on-error: true
        shell: pixi run bash -e {0}
        run: |
          rm -rf benchmarks asv.conf.json
          cp -r /tmp/benchmarks benchmarks
          cp /tmp/asv.conf.json asv.conf.json
          asv run -E "existing:$(which python)" \
            --set-commit-hash ${{ steps.shas.outputs.pr }} \
            --record-samples --quick

      # ── Compare ────────────────────────────────────────────────
      # TODO: switch to `uvx asv-spyglass` once the labels feature is released
      - name: Compare results
        id: compare
        run: |
          MACHINE=$(ls .asv/results/ | grep -v benchmarks.json | head -1)
          MAIN_SHORT="${{ steps.shas.outputs.main }}"
          PR_SHORT="${{ steps.shas.outputs.pr }}"
          BEFORE=$(ls .asv/results/$MACHINE/${MAIN_SHORT:0:8}* 2>/dev/null | head -1)
          AFTER=$(ls .asv/results/$MACHINE/${PR_SHORT:0:8}* 2>/dev/null | head -1)
          if [[ -z "$BEFORE" || -z "$AFTER" ]]; then
            echo "Benchmark comparison skipped: missing result files (before=${BEFORE:-<empty>}, after=${AFTER:-<empty>})"
            mkdir -p .asv/results
            echo "Benchmark comparison skipped: missing result files" > .asv/results/comparison.txt
          else
            uvx --from "asv-spyglass @ git+https://github.com/HaoZeke/asv_spyglass.git@enh-multiple-comparisons" \
              asv-spyglass compare --label-before main --label-after pr \
              "$BEFORE" "$AFTER" > .asv/results/comparison.txt 2>&1 || true
          fi
          echo "main_sha=${{ steps.shas.outputs.main }}" >> .asv/results/metadata.txt
          echo "pr_sha=${{ steps.shas.outputs.pr }}" >> .asv/results/metadata.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .asv/results/
          retention-days: 7
