---
jobs:
  towncrier:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v5
      with:
        cache: pip
        python-version: '3.12'
    - name: Install towncrier
      run: python3 -m pip install --quiet towncrier
    - env:
        BASE_REF: ${{ github.event.pull_request.base.ref }}
      name: towncrier check
      run: |-
        git fetch origin "$BASE_REF"
        if towncrier check --compare-with "origin/${BASE_REF}"; then
          echo "towncrier check ok"
        else
          echo "::error::Missing or invalid newsfragment for shipped-path changes."
          echo "Add docs/newsfragments/<issue>.<type>.md (see docs/newsfragments/README.md)"
          echo "Types: security removed deprecated added dev changed fixed"
          exit 1
        fi
name: Towncrier check
on:
  pull_request:
    paths:
    - eon/**
    - client/**
    - meson.build
    - meson_options.txt
    - CMakeLists.txt
    - pyproject.toml
    - pixi.toml
    - scripts/**
    - docs/newsfragments/**
    - towncrier.toml
    - CHANGELOG.md
permissions:
  contents: read
  pull-requests: read
