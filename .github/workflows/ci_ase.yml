name: Build and test eonclient with ASE
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
on: [push, pull_request]
jobs:
  build_eon:
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: true
          activate-environment: true
          environments: >-
            dev
      - name: Install cbindgen
        shell: bash
        run: command -v cbindgen || cargo install cbindgen
      - name: Install ASE
        shell: pixi run -e dev bash -e {0}
        run: pip install ase
      - name: Build eonclient with ASE
        shell: pixi run -e dev bash -e {0}
        run: |
          meson setup bbdir  \
          --prefix=$CONDA_PREFIX           \
          --buildtype release              \
          --libdir=lib                     \
          -Dwith_ase=True            \
          -Dwith_tests=True
          meson install -C bbdir
      - name: Run tests
        shell: pixi run -e dev bash -e {0}
        run: |
          meson test -C bbdir test_ase_pot
